<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>宋俊宏婦幼醫院 — 登入</title>
<meta name="theme-color" content="#2a0d1e">
<link rel="stylesheet" href="../style/base.css">
<link rel="stylesheet" href="../style/components.css">
<link rel="stylesheet" href="../style/anime.css">
<style>
/* ── 登入頁專屬 ── */
body{
  height: 100vh; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.login-bg{
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #fdf5f9 0%, #f0eafe 35%, #fde8f5 65%, #e8f5fe 100%);
  background-size: 400% 400%;
  animation: gradientFlow 12s ease infinite;
  z-index: 0;
}

/* 裝飾圓圈 */
.deco{ position:fixed; pointer-events:none; border-radius:50%; z-index:0 }
.deco-a{
  width:480px; height:480px;
  background: radial-gradient(circle, rgba(232,112,154,0.18) 0%, transparent 70%);
  top:-120px; right:-120px;
  animation: floatSlow 9s ease-in-out infinite;
}
.deco-b{
  width:360px; height:360px;
  background: radial-gradient(circle, rgba(155,127,212,0.14) 0%, transparent 70%);
  bottom:-80px; left:-80px;
  animation: floatSlow 11s ease-in-out infinite reverse;
}
.deco-c{
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(90,158,245,0.10) 0%, transparent 70%);
  top:40%; left:15%;
  animation: floatSlow 7s ease-in-out infinite 1.5s;
}

/* 漂浮符號 */
.floaty{
  position: fixed; pointer-events:none;
  font-size: 22px; opacity: 0.18; z-index: 0;
  animation: sakuraDrop linear infinite;
}

/* 登入卡 */
.login-wrap{ position:relative; z-index:10; width:100%; max-width:420px; padding:16px }
.login-card{
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(232,112,154,0.2);
  border-radius: var(--radius-xl);
  box-shadow:
    0 24px 64px rgba(232,112,154,0.18),
    0 8px 24px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.9);
  overflow: hidden;
}

/* 卡頂漸層條 */
.login-bar{
  height: 5px;
  background: linear-gradient(90deg, #e8709a, #9b7fd4, #5a9ef5, #3db89a, #e8709a);
  background-size: 300% auto;
  animation: shimmer 4s linear infinite;
}

.login-inner{ padding: 36px 36px 32px }

/* Logo 區 */
.login-logo-wrap{
  text-align: center; margin-bottom: 28px;
}
.login-logo{
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #e8709a, #9b7fd4);
  border-radius: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 32px;
  box-shadow: 0 8px 24px rgba(232,112,154,0.35);
  margin-bottom: 14px;
  animation: float 5s ease-in-out infinite;
}
.login-hospital{
  font-size: 20px; font-weight: 900;
  background: linear-gradient(135deg, #2a0d1e, #e8709a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.login-subtitle{ font-size: 12px; color: var(--faint); font-weight: 500 }

/* 分隔線 */
.login-divider{
  display: flex; align-items: center; gap: 10px;
  margin: 18px 0; color: var(--faint); font-size: 12px;
}
.login-divider::before, .login-divider::after{
  content:''; flex:1;
  height: 1px; background: var(--b1);
}

/* Google 按鈕 */
.btn-google{
  width: 100%; padding: 13px;
  border-radius: var(--radius-sm); border: 1.5px solid var(--b2);
  background: white; color: var(--text);
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all var(--t-spring);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: var(--shadow);
}
.btn-google:hover{
  border-color: var(--sakura);
  box-shadow: 0 4px 14px rgba(232,112,154,0.2);
  transform: translateY(-1px);
}
.btn-google:disabled{ opacity: .6; cursor: not-allowed; transform: none }
.google-icon{ width:20px; height:20px; flex-shrink:0 }

/* 輸入框群組 */
.input-icon-wrap{ position:relative }
.input-icon-wrap .input{ padding-left: 40px }
.input-icon-wrap .i-icon{
  position:absolute; left:12px; top:50%;
  transform:translateY(-50%);
  color:var(--faint); font-size:16px; pointer-events:none;
}

/* 登入按鈕 */
.btn-login{
  width:100%; padding:13px;
  border-radius: var(--radius-sm); border:none;
  background: linear-gradient(135deg, #e8709a 0%, #c4527a 100%);
  color:white; font-size:15px; font-weight:800; font-family:inherit;
  cursor:pointer; transition: all var(--t-spring);
  box-shadow: 0 4px 14px rgba(232,112,154,0.35);
  margin-top: 4px;
}
.btn-login:hover{
  transform:translateY(-2px);
  box-shadow: 0 8px 22px rgba(232,112,154,0.5);
}
.btn-login:active{ transform:translateY(0) }

/* 錯誤訊息 */
.login-err{
  display:none; margin-top:10px;
  background:var(--red-bg); color:var(--red);
  border-radius:var(--radius-xs);
  padding:10px 14px; font-size:13px; font-weight:600;
}

/* 頁尾 */
.login-footer{
  text-align:center; padding:16px 36px;
  font-size:11px; color:var(--faint);
  border-top:1px solid var(--b1);
  background: rgba(253,245,249,0.5);
}
</style>
</head>
<body>

<!-- 背景 -->
<div class="login-bg"></div>
<div class="deco deco-a"></div>
<div class="deco deco-b"></div>
<div class="deco deco-c"></div>

<!-- 漂浮裝飾 -->
<span class="floaty" style="left:8%;animation-duration:14s;animation-delay:0s;font-size:18px">🌸</span>
<span class="floaty" style="left:20%;animation-duration:18s;animation-delay:3s;font-size:14px">✦</span>
<span class="floaty" style="left:75%;animation-duration:16s;animation-delay:1s;font-size:16px">🌸</span>
<span class="floaty" style="left:88%;animation-duration:12s;animation-delay:5s;font-size:12px">✦</span>
<span class="floaty" style="left:55%;animation-duration:20s;animation-delay:8s;font-size:10px">❋</span>

<!-- 登入卡 -->
<div class="login-wrap">
  <div class="login-card">
    <div class="login-bar"></div>
    <div class="login-inner">

      <!-- Logo -->
      <div class="login-logo-wrap">
        <div class="login-logo">🏥</div>
        <div class="login-hospital">宋俊宏婦幼醫院</div>
        <div class="login-subtitle">協作管理系統 · 以愛守護每一個新生命</div>
      </div>

      <!-- Google 登入 -->
      <button class="btn-google" id="loginGoogleBtn" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span id="loginBtnText">以 Google 帳號登入</span>
      </button>

      <div class="login-divider">或使用帳號密碼</div>

      <!-- 帳密登入 -->
      <div class="input-group">
        <label class="input-label">帳號</label>
        <div class="input-icon-wrap">
          <span class="i-icon">👤</span>
          <input class="input" id="loginUser" type="text" placeholder="輸入帳號" autocomplete="username"
            onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">密碼</label>
        <div class="input-icon-wrap">
          <span class="i-icon">🔒</span>
          <input class="input" id="loginPass" type="password" placeholder="輸入密碼" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>

      <button class="btn-login" onclick="doLogin()">登入系統</button>
      <div class="login-err" id="loginErr"></div>
    </div>

    <div class="login-footer">
      宋俊宏婦幼醫院 &copy; 2025 &nbsp;·&nbsp; 僅供院內人員使用
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="../js/auth.js"></script>
<script>
  // 載入 store 供帳密登入使用
  window.addEventListener('load', function() {
    if (typeof firebase === 'undefined') return;
    firebase.initializeApp && fbDb && fbDb.ref('/').once('value', function(snap) {
      store = normalizeStore(snap.val() || defaultStore());
    });
  });
</script>
</body>
</html>
