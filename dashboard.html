<style>
/* ── Dashboard 專屬 ── */
.page-wrap{
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow-y: auto;
  padding: 20px;
  gap: 20px;
}

/* 模組格 */
.module-grid{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

/* 底部雙欄 */
.bottom-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.section-title{
  font-size: 14px; font-weight: 700;
  color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.ann-item{
  padding: 10px 0; border-bottom: 1px solid var(--b1);
  font-size: 13px; cursor: pointer;
  transition: color var(--t-fast);
}
.ann-item:last-child{ border-bottom: none }
.ann-item:hover{ color: var(--sakura) }
.ann-time{ font-size: 11px; color: var(--faint); margin-top: 2px }
.todo-item{
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--b1);
  font-size: 13px;
}
.todo-item:last-child{ border-bottom: none }
.todo-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0 }

/* Header 日期 */
.header-date{ font-size: 12px; color: var(--faint) }
.header-user{
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600;
}
.header-avatar{
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--sakura), var(--lavender));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 700;
}

/* RWD */
@media (max-width: 900px){ .module-grid{ grid-template-columns: repeat(3,1fr) } }
@media (max-width: 640px){
  .module-grid{ grid-template-columns: repeat(2,1fr) }
  .bottom-grid{ grid-template-columns: 1fr }
  .metric-grid{ grid-template-columns: repeat(2,1fr) }
}
@media (max-width: 360px){
  .module-grid{ grid-template-columns: 1fr 1fr }
}
</style>

function today() {
  return new Date().toISOString().slice(0,10);
}
function fmtDate(d) {
  if (!d) return '';
  var dt = new Date(d);
  return dt.toLocaleDateString('zh-TW', { month:'long', day:'numeric', weekday:'short' });
}

function initDashboard() {
  // 日期
  var now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  // 使用者
  if (currentUser) {
    var initial = (currentUser.name || '?')[0];
    document.getElementById('navUserAvatar').textContent = initial;
    document.getElementById('navUserName').textContent = currentUser.name || currentUser.username;
    document.getElementById('headerAvatar').textContent = initial;
    document.getElementById('headerUserName').textContent = currentUser.name || '使用者';
  }

  // 模組格
  var grid = document.getElementById('moduleGrid');
  grid.innerHTML = MODULES.map(function(m) {
    return '<a class="module-card card-shine" href="' + m.href + '">'
      + '<div class="card-bar ' + m.g + '"></div>'
      + '<div class="module-icon" style="position:relative">'
      + '<span style="font-size:28px">' + m.icon + '</span>'
      + '</div>'
      + '<div class="module-name">' + m.name + '</div>'
      + '</a>';
  }).join('');

  if (!store) return;

  // 統計數字
  var todayStr = today();
  var shifts = store.shifts || [];
  var todayShifts = shifts.filter(function(s) { return s.date === todayStr; });
  document.getElementById('m-shifts').textContent = todayShifts.length;

  var forms = store.formRequests || [];
  var pending = forms.filter(function(f) { return f.status === 'pending'; });
  document.getElementById('m-pending').textContent = pending.length;
  if (pending.length > 0) {
    document.getElementById('formsBadge').textContent = pending.length;
    document.getElementById('formsBadge').style.display = 'flex';
  }

  var inv = store.inventory || [];
  var lowStock = inv.filter(function(i) { return i.quantity !== undefined && i.quantity <= (i.minQty || 5); });
  document.getElementById('m-inventory').textContent = lowStock.length;

  var duty = store.dutySchedule || {};
  var todayOnDuty = Object.values(duty).filter(function(d) {
    return d && d[todayStr] && d[todayStr] !== 'off';
  });
  document.getElementById('m-duty').textContent = todayOnDuty.length || '—';

  // 公告
  var anns = (store.announcements || []).slice().reverse().slice(0, 5);
  var annEl = document.getElementById('annList');
  if (anns.length === 0) {
    annEl.innerHTML = '<div style="color:var(--faint);font-size:13px">目前沒有公告</div>';
  } else {
    annEl.innerHTML = anns.map(function(a) {
      return '<div class="ann-item">'
        + '<div class="truncate">' + (a.title || a.content || '') + '</div>'
        + '<div class="ann-time">' + (a.createdAt || '') + '</div>'
        + '</div>';
    }).join('');
  }

  // 待辦
  var todos = [];
  var myPending = pending.filter(function(f) {
    return f.applicantId === (currentUser && currentUser.id);
  });
  if (myPending.length) todos.push({ dot:'var(--lavender)', text: '您有 ' + myPending.length + ' 筆表單待審核' });
  var unsignedCrit = shifts.filter(function(s) { return !s.toSigned && s.urgency === 'critical' });
  if (unsignedCrit.length) todos.push({ dot:'var(--red)', text: '🚨 ' + unsignedCrit.length + ' 筆警示交班未簽收' });
  if (lowStock.length) todos.push({ dot:'var(--amber)', text: '⚠️ ' + lowStock.length + ' 項庫存低於警戒' });

  var todoEl = document.getElementById('todoList');
  if (todos.length === 0) {
    todoEl.innerHTML = '<div style="color:var(--faint);font-size:13px">今日無待辦事項 ✓</div>';
  } else {
    todoEl.innerHTML = todos.map(function(t) {
      return '<div class="todo-item">'
        + '<div class="todo-dot" style="background:' + t.dot + '"></div>'
        + '<span>' + t.text + '</span>'
        + '</div>';
    }).join('');
  }

  // 跑馬燈（公告）
  if (anns.length > 0) {
    var inner = document.getElementById('marqueeInner');
    var items = anns.map(function(a) {
      return '<span class="marquee-item">' + (a.title || a.content || '') + '</span>'
        + '<span class="marquee-sep">✦</span>';
    }).join('');
    inner.innerHTML = items + items; // 雙份讓動畫無縫
  }
}

// Nav 展開/收合
function toggleNav() {
  document.getElementById('mainNav').classList.toggle('nav-expanded');
}
function toggleGroup(hdr) {
  var body = hdr.nextElementSibling;
  if (body) body.classList.toggle('ng-collapsed');
}
function navigateTo(url) {
  window.location.href = url;
}

// 等 Firebase 載入完成再渲染
window.addEventListener('load', function() {
  requireAuth();
  // 若 Firebase 需要時間，先用 local 狀態
  setTimeout(function() {
    if (!store) { store = defaultStore(); }
    // 嘗試從 firebase 抓資料
    if (fbDb) {
      fbDb.ref('/').once('value', function(snap) {
        store = normalizeStore(snap.val() || defaultStore());
        var savedId = localStorage.getItem('loggedInUserId');
        if (savedId && !currentUser) {
          currentUser = store.users.find(function(u) { return u.id === savedId; });
        }
        initDashboard();
      });
    } else {
      var savedId = localStorage.getItem('loggedInUserId');
      if (savedId && store) {
        currentUser = store.users.find(function(u) { return u.id === savedId; });
      }
      initDashboard();
    }
  }, 300);
});
</script>
</body>
</html>
